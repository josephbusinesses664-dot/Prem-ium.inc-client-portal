services:
  - type: web
    name: prem-ium-inc-client-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm audit fix --force --production
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        value: josephbusinesses664-dot
      - key: PORTAL_REPO
        value: openclaw-client-portal
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: prem
      - key: ADMIN_PASSWORD
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_RESULTS_CH
        value: "1516605432830103602"
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_MEASUREMENT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AGGREGATE_SECRET
        sync: false
