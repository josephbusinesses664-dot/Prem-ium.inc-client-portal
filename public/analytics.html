<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%23b0563d' d='M50 12C50 12 22 40 22 60a16 16 0 0027 12c-1 9-6 13-12 16h26c-6-3-11-7-12-16a16 16 0 0027-12C78 40 50 12 50 12z'/></svg>">
<title>Analytics — prem-ium.inc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #faf9f6; color: #2b2721; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #ffffff; border-bottom: 1px solid #e7e2d8; padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .logo { font-size: 20px; font-weight: 800; color: #b0563d; text-decoration: none; }
  .logo span { color: #b0563d; }
  .back { color: #b0563d; font-size: 13px; text-decoration: none; }
  .back:hover { text-decoration: underline; }
  .biz-label { font-weight: 600; font-size: 15px; margin-left: 8px; }
  .user-info { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 13px; color: #8a8378; }
  .logout { background: none; border: 1px solid #e7e2d8; color: #b0563d; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }

  .layout { display: flex; flex: 1; min-height: 0; }
  .main-content { flex: 1; overflow-y: auto; padding: 28px 28px 40px; }
  .chat-sidebar { width: 320px; border-left: 1px solid #e7e2d8; background: #ffffff; display: flex; flex-direction: column; flex-shrink: 0; }

  /* Date range tabs */
  .date-tabs { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; }
  .date-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #e7e2d8; background: none; color: #8a8378; }
  .date-tab.active { background: #b0563d; color: #fff; border-color: #b0563d; }
  .date-tab:hover:not(.active) { border-color: #b0563d; color: #b0563d; }
  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { color: #8a8378; font-size: 13px; margin-bottom: 24px; }

  /* KPI cards */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: #ffffff; border: 1px solid #e7e2d8; border-radius: 12px; padding: 20px; position: relative; }
  .kpi-card:hover { border-color: #e7e2d8; }
  .kpi-label { font-size: 12px; color: #8a8378; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; display: flex; align-items: center; gap: 4px; }
  .kpi-value { font-size: 32px; font-weight: 800; color: #b0563d; margin: 8px 0 6px; line-height: 1; }
  .kpi-desc { font-size: 12px; color: #8a8378; line-height: 1.4; }
  .info-btn { background: none; border: none; color: #b3a795; cursor: pointer; padding: 0; line-height: 0; display: inline-flex; vertical-align: middle; transition: color .15s; }
  .info-btn:hover { color: #b0563d; }
  .tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 0; right: 0; background: #e7e2d8; color: #2b2721; font-size: 12px; padding: 10px; border-radius: 8px; z-index: 10; line-height: 1.5; }
  .kpi-card:hover .tooltip, .kpi-card:focus-within .tooltip { display: block; }

  /* Mid row */
  .mid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .panel { background: #ffffff; border: 1px solid #e7e2d8; border-radius: 12px; padding: 20px; }
  .panel-title { font-size: 14px; font-weight: 700; color: #b0563d; margin-bottom: 16px; }

  /* Country bars */
  .country-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .country-name { width: 120px; flex-shrink: 0; color: #2b2721; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-wrap { flex: 1; background: #e7e2d8; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #b0563d, #b0563d); border-radius: 4px; transition: width .4s; }
  .country-count { width: 36px; text-align: right; color: #8a8378; font-size: 12px; flex-shrink: 0; }

  /* Device donut-style */
  .device-row { display: flex; flex-direction: column; gap: 10px; }
  .device-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .device-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .device-name { flex: 1; text-transform: capitalize; }
  .device-pct { font-weight: 700; color: #b0563d; }
  .device-bar-wrap { width: 80px; background: #e7e2d8; border-radius: 4px; height: 6px; overflow: hidden; }
  .device-bar-fill { height: 100%; border-radius: 4px; }

  /* Pages table */
  .pages-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pages-table th { color: #8a8378; font-weight: 600; padding: 8px 0; border-bottom: 1px solid #e7e2d8; text-align: left; }
  .pages-table td { padding: 9px 0; border-bottom: 1px solid #f3f1ea; color: #2b2721; }
  .pages-table td:last-child { text-align: right; color: #b0563d; font-weight: 700; }
  .page-path { font-family: monospace; font-size: 12px; color: #9a5138; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

  /* Trend */
  .trend-wrap { margin-bottom: 24px; }
  .trend-bars { display: flex; gap: 3px; align-items: flex-end; height: 60px; }
  .trend-bar { flex: 1; background: #e7e2d8; border-radius: 2px 2px 0 0; min-height: 2px; transition: height .3s; cursor: default; }
  .trend-bar:hover { background: #b0563d; }
  .trend-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: #8a8378; }

  /* Skeleton loading */
  .skeleton { background: linear-gradient(90deg, #ffffff 25%, #e7e2d8 50%, #ffffff 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skel-kpi { height: 100px; }
  .skel-panel { height: 200px; }

  /* Error / no-data */
  .no-data { color: #8a8378; text-align: center; padding: 48px 20px; }
  .no-data h3 { font-size: 18px; margin-bottom: 8px; color: #8a8378; }
  .no-data code { background: #ffffff; border: 1px solid #e7e2d8; padding: 12px 16px; border-radius: 8px; font-size: 12px; display: block; text-align: left; margin-top: 16px; white-space: pre; line-height: 1.6; }

  /* Chat sidebar */
  .chat-header { padding: 16px 18px; border-bottom: 1px solid #e7e2d8; font-weight: 700; font-size: 14px; color: #b0563d; display: flex; align-items: center; gap: 8px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 90%; }
  .chat-msg.user { background: #e7e2d8; color: #2b2721; align-self: flex-end; border-radius: 10px 10px 2px 10px; }
  .chat-msg.bot { background: #ffffff; border: 1px solid #e7e2d8; color: #2b2721; align-self: flex-start; border-radius: 10px 10px 10px 2px; }
  .chat-msg.bot.loading { color: #8a8378; font-style: italic; }
  .chat-suggestions { padding: 0 16px 10px; display: flex; flex-direction: column; gap: 6px; }
  .chat-suggestion { background: none; border: 1px solid #e7e2d8; color: #b0563d; border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; text-align: left; }
  .chat-suggestion:hover { background: #e7e2d8; }
  .chat-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e7e2d8; }
  .chat-input { flex: 1; background: #ffffff; border: 1px solid #e7e2d8; border-radius: 20px; padding: 8px 14px; color: #2b2721; font-size: 13px; outline: none; }
  .chat-input:focus { border-color: #b0563d; }
  .chat-send { background: #b0563d; color: #fff; border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chat-send:hover { background: #96472f; }
  .chat-send:disabled { background: #e7e2d8; cursor: not-allowed; }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .chat-sidebar { width: 100%; height: 360px; border-left: none; border-top: 1px solid #e7e2d8; }
    .mid-row { grid-template-columns: 1fr; }
  }

  /* ── Seasoning ── */
  ::selection { background: rgba(176,86,61,.35); color: #fff; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #faf9f6; }
  ::-webkit-scrollbar-thumb { background: #e7e2d8; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #b0563d; }
  .kpi-card, .panel { transition: border-color .25s, box-shadow .25s, transform .25s; }
  .kpi-card:hover { border-color: #b0563d; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(176,86,61,.14); }
  .panel:hover { border-color: rgba(176,86,61,.55); box-shadow: 0 6px 26px rgba(176,86,61,.12); }
  .kpi-value { background: linear-gradient(135deg, #b0563d, #b0563d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .bar-fill { background: linear-gradient(90deg, #b0563d, #b0563d); transition: width .8s cubic-bezier(.2,.8,.2,1); }
  .date-tab { transition: border-color .18s, color .18s, background .18s; }
  .date-tab.active { background: linear-gradient(135deg, #b0563d, #b0563d); border-color: transparent; }
  .chat-input { transition: border-color .2s, box-shadow .2s; }
  .chat-input:focus { box-shadow: 0 0 0 3px rgba(176,86,61,.16), 0 0 18px rgba(176,86,61,.25); }
  .chat-send { transition: transform .15s, box-shadow .15s; }
  .chat-send:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(176,86,61,.4); }
  .chat-suggestion { transition: border-color .18s, color .18s, transform .18s; }
  .chat-suggestion:hover { border-color: #b0563d; transform: translateY(-1px); }
  h1,h2,h3,.page-title,.section-title,.logo{font-family:'Fraunces',Georgia,serif;}
  .logo{font-weight:700;letter-spacing:-.02em;}
  ::selection{background:rgba(176,86,61,.18);}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">prem-ium<span>.inc</span></a>
  <a class="back" href="/dashboard">← Dashboard</a>
  <span class="biz-label" id="biz-label">Analytics</span>
  <div class="user-info">
    <span id="user-label"></span>
    <button class="logout" onclick="logout()">Log out</button>
  </div>
</header>

<div class="layout">
  <!-- Main analytics content -->
  <div class="main-content">
    <div class="date-tabs">
      <button class="date-tab" onclick="setRange('7daysAgo', this)">7 Days</button>
      <button class="date-tab active" onclick="setRange('30daysAgo', this)">30 Days</button>
      <button class="date-tab" onclick="setRange('90daysAgo', this)">90 Days</button>
    </div>

    <div id="content">
      <!-- KPI row skeleton -->
      <div class="kpi-row" id="kpi-row">
        <div class="skeleton skel-kpi"></div>
        <div class="skeleton skel-kpi"></div>
        <div class="skeleton skel-kpi"></div>
        <div class="skeleton skel-kpi"></div>
      </div>
      <!-- Mid row skeleton -->
      <div class="mid-row">
        <div class="skeleton skel-panel"></div>
        <div class="skeleton skel-panel"></div>
      </div>
      <div class="skeleton skel-panel"></div>
    </div>
  </div>

  <!-- Chat sidebar -->
  <div class="chat-sidebar">
    <div class="chat-header"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;margin-bottom:1px"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8.01" y2="16"/><line x1="16" y1="16" x2="16.01" y2="16"/></svg>Analytics Assistant</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg bot">Hi! I can help explain your website analytics in plain English. Try asking me anything!</div>
    </div>
    <div class="chat-suggestions" id="suggestions">
      <button class="chat-suggestion" onclick="askQuestion(this.textContent)">How is my site performing?</button>
      <button class="chat-suggestion" onclick="askQuestion(this.textContent)">Where are my visitors from?</button>
      <button class="chat-suggestion" onclick="askQuestion(this.textContent)">What does bounce rate mean?</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Ask about your analytics…" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" id="chat-send" onclick="sendChat()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('oc_token');
const slug = localStorage.getItem('oc_slug');
const username = localStorage.getItem('oc_username');
if (!token) location.href = '/login?next=/analytics';
// Analytics is per-site — admins without a linked site go to the admin panel
if (localStorage.getItem('oc_role') === 'admin' && !slug) location.href = '/admin';
document.getElementById('user-label').textContent = username || '';

let currentData = null;
let currentRange = '30daysAgo';

const DEVICE_COLORS = { mobile: '#b0563d', desktop: '#3b82f6', tablet: '#b0563d' };

const TOOLTIPS = {
  users: 'The number of unique people who visited your website in this period.',
  sessions: 'Total visits to your site — one person can have multiple sessions if they visit on different days.',
  pageviews: 'How many pages were viewed in total across all visits.',
  bounceRate: 'Percentage of visitors who left after viewing just one page. Lower is generally better.',
  avgSessionDuration: 'Average time visitors spent on your site per visit. Longer usually means more engagement.',
};

async function load() {
  try {
    const r = await fetch(`/api/analytics/${slug}?period=${currentRange}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (r.status === 401) { logout(); return; }
    const data = await r.json();

    if (data.error) {
      showError(data.error, data.hint);
      return;
    }

    currentData = data;
    document.getElementById('biz-label').textContent = data.site?.business || 'Analytics';
    document.title = (data.site?.business || 'Analytics') + ' — prem-ium.inc';
    render(data);
  } catch (err) {
    showError('Could not load analytics data', '');
  }
}

function showError(msg, hint) {
  document.getElementById('content').innerHTML = `
    <div class="no-data">
      <h3>Analytics not available yet</h3>
      <p>${msg}</p>
      ${hint ? `<code>${hint}</code>` : ''}
      <p style="margin-top:16px;font-size:12px;color:#8a8378">Once the GA4 snippet is injected into your site and visitors arrive, data appears here within 24–48 hours.</p>
    </div>`;
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}
function fmtDuration(s) {
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function render(d) {
  const content = document.getElementById('content');
  content.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-row" id="kpi-row">
      ${kpiCard('Users', fmtNum(d.users), 'Unique visitors to your site', TOOLTIPS.users)}
      ${kpiCard('Sessions', fmtNum(d.sessions), 'Total visits (repeat visitors count too)', TOOLTIPS.sessions)}
      ${kpiCard('Page Views', fmtNum(d.pageviews), 'Total pages viewed across all visits', TOOLTIPS.pageviews)}
      ${kpiCard('Bounce Rate', d.bounceRate + '%', 'Visitors who left after one page', TOOLTIPS.bounceRate)}
    </div>

    <!-- Trend -->
    ${d.trend?.length ? trendChart(d.trend) : ''}

    <!-- Mid row -->
    <div class="mid-row">
      <!-- Countries -->
      <div class="panel">
        <div class="panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;margin-bottom:1px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Visitor Locations</div>
        ${countriesPanel(d.topCountries)}
        ${d.topCities?.length ? `<div style="margin-top:14px;font-size:12px;color:#8a8378">
          Top cities: ${d.topCities.map(c => `<span style="color:#b0563d">${c.city}</span> (${c.users})`).join(', ')}
        </div>` : ''}
      </div>
      <!-- Devices -->
      <div class="panel">
        <div class="panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;margin-bottom:1px"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>Devices</div>
        ${devicesPanel(d.deviceBreakdown)}
      </div>
    </div>

    <!-- Top pages -->
    ${d.topPages?.length ? `
    <div class="panel">
      <div class="panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;margin-bottom:1px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Top Pages</div>
      <table class="pages-table">
        <thead><tr><th>Page</th><th style="text-align:right">Views</th></tr></thead>
        <tbody>
          ${d.topPages.map(p => `<tr><td><span class="page-path">${p.path}</span></td><td>${p.views.toLocaleString()}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

function kpiCard(label, value, desc, tooltip) {
  return `<div class="kpi-card" tabindex="0">
    <div class="kpi-label">${label} <button class="info-btn" tabindex="-1" aria-label="More info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></button></div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-desc">${desc}</div>
    <div class="tooltip">${tooltip}</div>
  </div>`;
}

function countriesPanel(countries) {
  if (!countries?.length) return '<div style="color:#8a8378;font-size:13px">No location data yet</div>';
  const max = Math.max(...countries.map(c => c.users), 1);
  return countries.map(c => `
    <div class="country-row">
      <span class="country-name">${c.country}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(c.users/max*100)}%"></div></div>
      <span class="country-count">${c.users}</span>
    </div>`).join('');
}

function devicesPanel(devices) {
  if (!devices?.length) return '<div style="color:#8a8378;font-size:13px">No device data yet</div>';
  const total = devices.reduce((s, d) => s + d.users, 0) || 1;
  const colors = ['#b0563d', '#3b82f6', '#b0563d', '#b0563d'];
  return `<div class="device-row">${devices.map((d, i) => {
    const pct = Math.round(d.users / total * 100);
    const color = DEVICE_COLORS[d.device?.toLowerCase()] || colors[i % colors.length];
    return `<div class="device-item">
      <div class="device-dot" style="background:${color}"></div>
      <span class="device-name">${d.device}</span>
      <div class="device-bar-wrap"><div class="device-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="device-pct">${pct}%</span>
    </div>`;
  }).join('')}</div>`;
}

function trendChart(trend) {
  const maxU = Math.max(...trend.map(t => t.users), 1);
  const bars = trend.slice(-20).map(t => {
    const h = Math.max(4, Math.round(t.users / maxU * 56));
    return `<div class="trend-bar" style="height:${h}px" title="${t.date}: ${t.users} users"></div>`;
  }).join('');
  const dates = trend.slice(-20);
  const startDate = dates[0]?.date.replace(/(\d{4})(\d{2})(\d{2})/, '$2/$3') || '';
  const endDate = dates[dates.length-1]?.date.replace(/(\d{4})(\d{2})(\d{2})/, '$2/$3') || '';
  return `<div class="panel trend-wrap" style="margin-bottom:24px">
    <div class="panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;margin-bottom:1px"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Daily Visitors</div>
    <div class="trend-bars">${bars}</div>
    <div class="trend-labels"><span>${startDate}</span><span>${endDate}</span></div>
  </div>`;
}

function setRange(range, btn) {
  currentRange = range;
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Show skeleton
  document.getElementById('content').innerHTML = `
    <div class="kpi-row">${Array(4).fill('<div class="skeleton skel-kpi"></div>').join('')}</div>
    <div class="mid-row"><div class="skeleton skel-panel"></div><div class="skeleton skel-panel"></div></div>
    <div class="skeleton skel-panel" style="margin-top:16px"></div>`;
  load();
}

// ── Chatbot ───────────────────────────────────────────────────────────────────

function askQuestion(q) {
  document.getElementById('chat-input').value = q;
  document.getElementById('suggestions').style.display = 'none';
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  const messages = document.getElementById('chat-messages');
  messages.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;

  const loadingId = 'bot-' + Date.now();
  messages.innerHTML += `<div class="chat-msg bot loading" id="${loadingId}">Thinking…</div>`;
  messages.scrollTop = messages.scrollHeight;

  const sendBtn = document.getElementById('chat-send');
  sendBtn.disabled = true;

  try {
    const r = await fetch(`/api/analytics/${slug}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({
        message: msg,
        analyticsSnapshot: currentData ? {
          users: currentData.users,
          sessions: currentData.sessions,
          pageviews: currentData.pageviews,
          bounceRate: currentData.bounceRate,
          avgSessionDuration: currentData.avgSessionDuration,
          topCountries: currentData.topCountries?.slice(0, 5),
          topCities: currentData.topCities?.slice(0, 3),
          deviceBreakdown: currentData.deviceBreakdown,
          period: currentRange,
        } : null,
      }),
    });
    const data = await r.json();
    const el = document.getElementById(loadingId);
    if (el) { el.textContent = data.reply || 'Sorry, no response.'; el.classList.remove('loading'); }
  } catch {
    const el = document.getElementById(loadingId);
    if (el) { el.textContent = 'Could not reach the assistant.'; el.classList.remove('loading'); }
  } finally {
    sendBtn.disabled = false;
    messages.scrollTop = messages.scrollHeight;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function logout() { localStorage.clear(); location.href = '/'; }

load();
</script>
