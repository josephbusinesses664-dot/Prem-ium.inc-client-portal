<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%23ec4899' d='M50 12C50 12 22 40 22 60a16 16 0 0027 12c-1 9-6 13-12 16h26c-6-3-11-7-12-16a16 16 0 0027-12C78 40 50 12 50 12z'/></svg>">
<title>Login — prem-ium.inc</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a120e; color: #e2e8f0; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #0f1712; border-bottom: 1px solid #1e3a2b; padding: 16px 24px; }
  .logo { font-size: 20px; font-weight: 800; color: #ec4899; text-decoration: none; }
  .logo span { color: #f472b6; }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .box { background: #14241b; border: 1px solid #1e3a2b; border-radius: 14px; padding: 40px; width: 100%; max-width: 380px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #9ca3af; font-size: 14px; margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #10b981; margin-bottom: 6px; }
  input { width: 100%; background: #0f1712; border: 1px solid #14532d; border-radius: 8px; padding: 11px 14px; color: #e2e8f0; font-size: 14px; margin-bottom: 18px; outline: none; }
  input:focus { border-color: #10b981; }
  .btn { width: 100%; background: #10b981; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .btn:hover { background: #059669; }
  .btn:disabled { background: #14532d; cursor: not-allowed; }
  .error { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  .back { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
  .back a { color: #a78bfa; text-decoration: none; }

  /* ── Seasoning ── */
  ::selection { background: rgba(16,185,129,.35); color: #fff; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(500px 380px at 80% 10%, rgba(16,185,129,.16), transparent 70%),
      radial-gradient(420px 320px at 10% 85%, rgba(245,158,11,.1), transparent 70%);
  }
  .center { position: relative; z-index: 1; }
  .box { box-shadow: 0 18px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(16,185,129,.12); }
  input { transition: border-color .2s, box-shadow .2s; }
  input:hover { border-color: rgba(16,185,129,.6); box-shadow: 0 0 12px rgba(16,185,129,.14); }
  input:focus { box-shadow: 0 0 0 3px rgba(16,185,129,.18), 0 0 20px rgba(16,185,129,.3), 0 0 40px rgba(245,158,11,.12); }
  .btn { background: linear-gradient(135deg, #10b981, #f59e0b); transition: transform .18s, box-shadow .18s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(16,185,129,.42); }
</style>
</head>
<body>
<header><a class="logo" href="/"><span style="color:#ec4899">♠</span> prem-ium<span>.inc</span></a></header>
<div class="center">
  <div class="box">
    <h1>Welcome back</h1>
    <p class="sub">Log in to view and edit your website</p>
    <form id="form" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="your username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button class="btn" type="submit" id="btn">Log In</button>
      <div class="error" id="err"></div>
    </form>
    <div class="back"><a href="/">← Back to site gallery</a></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const next = params.get('next') || '/dashboard';

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  err.textContent = '';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('oc_token', data.token);
    localStorage.setItem('oc_role', data.role);
    localStorage.setItem('oc_slug', data.siteSlug || '');
    localStorage.setItem('oc_username', document.getElementById('username').value.trim());

    if (data.role === 'admin') {
      location.href = next === '/dashboard' ? '/admin' : next;
    } else {
      location.href = next;
    }
  } catch (ex) {
    err.textContent = ex.message;
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});
</script>
</body>
</html>
