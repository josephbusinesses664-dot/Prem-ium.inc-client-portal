<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%23b0563d' d='M50 12C50 12 22 40 22 60a16 16 0 0027 12c-1 9-6 13-12 16h26c-6-3-11-7-12-16a16 16 0 0027-12C78 40 50 12 50 12z'/></svg>">
<title>Login — prem-ium.inc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf9f6; --bg2:#f3f1ea; --surface:#ffffff;
    --text:#2b2721; --muted:#8a8378; --border:#e7e2d8;
    --accent:#b0563d; --accent-ink:#ffffff;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px 28px; }
  .logo { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(80,60,40,.07); }
  h1 { font-family: var(--serif); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 14.5px; margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; margin-bottom: 18px; outline: none; font-family: inherit; transition: border-color .18s, box-shadow .18s; }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(176,86,61,.13); }
  .btn { width: 100%; background: var(--accent); color: var(--accent-ink); border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: transform .16s, filter .16s; }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.07); }
  .btn:disabled { background: #cbb8ad; cursor: not-allowed; transform: none; }
  .error { color: #b4432e; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  .back { text-align: center; margin-top: 22px; font-size: 13px; color: var(--muted); }
  .back a { color: var(--accent); text-decoration: none; font-weight: 500; }
  ::selection { background: rgba(176,86,61,.18); }
</style>
</head>
<body>
<header><a class="logo" href="/">prem-ium<span>.inc</span></a></header>
<div class="center">
  <div class="box">
    <h1>Welcome back</h1>
    <p class="sub">Log in to view and edit your website.</p>
    <form id="form" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="your username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <button class="btn" type="submit" id="btn">Log In</button>
      <div class="error" id="err"></div>
    </form>
    <div class="back"><a href="/">← Back to site gallery</a></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const next = params.get('next') || '/dashboard';

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  err.textContent = '';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('oc_token', data.token);
    localStorage.setItem('oc_role', data.role);
    localStorage.setItem('oc_slug', data.siteSlug || '');
    localStorage.setItem('oc_username', document.getElementById('username').value.trim());

    if (data.role === 'admin') {
      location.href = next === '/dashboard' ? '/admin' : next;
    } else {
      location.href = next;
    }
  } catch (ex) {
    err.textContent = ex.message;
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});
</script>
</body>
</html>
