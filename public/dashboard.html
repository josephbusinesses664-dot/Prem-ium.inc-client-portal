<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%23b0563d' d='M50 12C50 12 22 40 22 60a16 16 0 0027 12c-1 9-6 13-12 16h26c-6-3-11-7-12-16a16 16 0 0027-12C78 40 50 12 50 12z'/></svg>">
<title>My Site — prem-ium.inc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf9f6; --bg2:#f3f1ea; --surface:#ffffff;
    --text:#2b2721; --muted:#8a8378; --border:#e7e2d8;
    --accent:#b0563d; --accent-ink:#ffffff;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .user-info { margin-left: auto; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 12px; }
  .logout { background: none; border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: background .16s; }
  .logout:hover { background: var(--bg2); }
  main { max-width: 1100px; margin: 0 auto; padding: 40px 28px 60px; }
  .site-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
  .site-info h1 { font-family: var(--serif); font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
  .site-info p { color: var(--muted); margin-top: 5px; font-size: 14.5px; }
  .actions { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 10px 18px; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; border: 1px solid transparent; transition: transform .16s, filter .16s, background .16s; }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { filter: brightness(1.07); }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg2); }
  .btn-danger { background: none; color: #b4432e; border: 1px solid #e3c4bb; }
  .btn-danger:hover { background: #f7ece8; }
  .preview-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 34px; box-shadow: 0 1px 3px rgba(80,60,40,.05); }
  .preview-bar { background: var(--bg2); padding: 10px 16px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .preview-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .preview-bar .url { color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 6px; flex: 1; font-size: 12px; }
  iframe { width: 100%; height: 600px; border: none; display: block; background: #fff; }
  .section-title { font-family: var(--serif); font-size: 19px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .request-form { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 34px; box-shadow: 0 1px 3px rgba(80,60,40,.05); }
  textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; resize: vertical; font-family: inherit; min-height: 80px; outline: none; transition: border-color .18s, box-shadow .18s; }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(176,86,61,.13); }
  .req-send { margin-top: 12px; background: var(--accent); color: var(--accent-ink); border: none; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform .16s, filter .16s; }
  .req-send:hover { transform: translateY(-1px); filter: brightness(1.07); }
  .requests-list { display: flex; flex-direction: column; gap: 10px; }
  .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color .18s, box-shadow .18s; }
  .req-card:hover { border-color: rgba(176,86,61,.4); box-shadow: 0 4px 16px rgba(80,60,40,.07); }
  .req-card .desc { font-size: 14px; margin-bottom: 8px; }
  .req-card .meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .badge { padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-pending { background: #f5e6cf; color: #9a6a1a; }
  .badge-in-progress { background: #e0e8f4; color: #3b5f93; }
  .badge-done { background: #dfeee2; color: #3a7a4a; }
  .note-text { font-size: 12.5px; color: #3a7a4a; margin-top: 6px; font-style: italic; }
  .status-msg { font-size: 13px; margin-top: 8px; min-height: 18px; }
  ::selection { background: rgba(176,86,61,.18); }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: #d8d0c2; border-radius: 5px; border: 2px solid var(--bg2); }
  ::-webkit-scrollbar-thumb:hover { background: #c4b9a6; }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">prem-ium<span>.inc</span></a>
  <div class="user-info">
    <span id="user-label">Loading…</span>
    <button class="logout" onclick="logout()">Log out</button>
  </div>
</header>
<main>
  <div class="site-header">
    <div class="site-info">
      <h1 id="biz-name">Your Site</h1>
      <p id="biz-info"></p>
    </div>
    <div class="actions">
      <a id="view-live" class="btn btn-secondary" href="#" target="_blank">View Live Site ↗</a>
      <a id="edit-mode" class="btn btn-primary" href="#"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;margin-bottom:1px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit My Site</a>
      <a id="analytics-link" class="btn btn-secondary" href="/analytics"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;margin-bottom:1px"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>View Analytics</a>
      <a id="github-history" class="btn btn-secondary" href="#" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;margin-bottom:1px"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>Edit History</a>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-bar">
      <div class="dot" style="background:#ef4444"></div>
      <div class="dot" style="background:#f59e0b"></div>
      <div class="dot" style="background:#22c55e"></div>
      <span id="preview-url" class="url">Loading…</span>
    </div>
    <iframe id="site-iframe" title="Site preview" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <div class="section-title">Submit a Change Request</div>
  <div class="request-form">
    <p style="font-size:13.5px;color:var(--muted);margin-bottom:12px">Describe any change you'd like — new content, layout updates, or anything complex. Our team will handle it and let you know when it's done.</p>
    <textarea id="req-text" placeholder="e.g. Please add a phone number in the header, update the hero image, change business hours to Mon–Sat 9am–6pm…"></textarea>
    <button class="req-send" onclick="sendRequest()">Submit Request</button>
    <div class="status-msg" id="req-status"></div>
  </div>

  <div class="section-title">Your Requests</div>
  <div id="requests-list" class="requests-list">
    <div style="color:var(--muted);font-size:14px">Loading…</div>
  </div>
</main>

<script>
const token = localStorage.getItem('oc_token');
const slug = localStorage.getItem('oc_slug');
const role = localStorage.getItem('oc_role');
const username = localStorage.getItem('oc_username');

if (!token) location.href = '/login';
// Admins have no site of their own — the dashboard is for clients
if (role === 'admin' || !slug) location.href = '/admin';

document.getElementById('user-label').textContent = username || 'Client';

async function init() {
  try {
    const r = await fetch(`/api/sites/${slug}`, { headers: { Authorization: `Bearer ${token}` } });
    if (r.status === 401) { logout(); return; }
    const site = await r.json();
    if (!r.ok || !site.business) {
      document.getElementById('biz-name').textContent = 'Site not found';
      document.getElementById('biz-info').textContent = 'This account is not linked to a site — contact prem-ium.inc.';
      return;
    }

    document.getElementById('biz-name').textContent = site.business;
    document.getElementById('biz-info').textContent = [site.city, site.category].filter(Boolean).join(' · ');
    document.getElementById('preview-url').textContent = site.renderUrl;
    document.getElementById('site-iframe').src = site.renderUrl;
    document.getElementById('view-live').href = site.renderUrl;
    document.getElementById('edit-mode').href = `/studio`;
    document.getElementById('github-history').href = `https://github.com/josephbusinesses664-dot/${encodeURIComponent(site.githubRepo)}/commits/main`;
    document.title = site.business + ' — prem-ium.inc Portal';
  } catch (e) {
    console.error(e);
  }
  loadRequests();
}

async function sendRequest() {
  const desc = document.getElementById('req-text').value.trim();
  if (!desc) return;
  const status = document.getElementById('req-status');
  status.style.color = 'var(--muted)';
  status.textContent = 'Sending…';
  try {
    const r = await fetch('/api/requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ description: desc }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    status.style.color = '#3a7a4a';
    status.textContent = 'Sent — we\'ll review it shortly.';
    document.getElementById('req-text').value = '';
    loadRequests();
  } catch (e) {
    status.style.color = '#b4432e';
    status.textContent = 'Error: ' + e.message;
  }
}

async function loadRequests() {
  try {
    const r = await fetch('/api/requests', { headers: { Authorization: `Bearer ${token}` } });
    const data = await r.json();
    const el = document.getElementById('requests-list');
    if (!data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:14px">No requests yet.</div>'; return; }
    el.innerHTML = data.map(req => `
      <div class="req-card">
        <div class="desc">${req.description}</div>
        <div class="meta">
          <span class="badge badge-${req.status}">${req.status}</span>
          <span>${new Date(req.createdAt).toLocaleDateString()}</span>
        </div>
        ${req.note ? `<div class="note-text"><svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;opacity:.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${req.note}</div>` : ''}
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('requests-list').innerHTML = '<div style="color:#b4432e">Could not load requests</div>';
  }
}

function logout() {
  localStorage.clear();
  location.href = '/';
}

init();
</script>
</body>
</html>
