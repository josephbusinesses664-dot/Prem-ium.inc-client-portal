name: keep-warm

# Pings the portal every ~10 min so the free Render web service never sleeps.
# A warm portal means /s/:nameSlug (and the prem-ium-inc /s/* proxy) render instantly
# instead of paying the ~50s free-tier cold-start. One always-on service fits the
# 750 free instance-hours/month; do NOT keep multiple free services warm this way.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          URL="${PORTAL_URL:-https://prem-ium-inc-client-portal.onrender.com}/healthz"
          echo "Pinging $URL"
          curl -fsS --max-time 90 "$URL" || echo "ping failed (portal may be waking)"
        env:
          PORTAL_URL: ${{ vars.PORTAL_URL }}
